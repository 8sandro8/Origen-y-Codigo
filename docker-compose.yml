version: '3.8'

services:
  app:
    image: origencodigo-app:v3
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "4008:8080"
    environment:
      - DB_URL=${DB_URL:-jdbc:mariadb://db:3306/origen_codigo}
      - DB_USER=${DB_USER:-root}
      - DB_PASSWORD=${DB_PASSWORD:-rootpassword}
      - UPLOAD_DIR=/usr/local/tomcat/webapps/uploads
    volumes:
      - uploads_data:/usr/local/tomcat/webapps/uploads
    restart: unless-stopped
    depends_on:
      - db

  db:
    image: mariadb:11.4
    ports:
      - "4009:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-rootpassword}
      - MYSQL_DATABASE=origen_codigo
    volumes:
      - mariadb_data:/var/lib/mysql
      # AÑADIMOS PREFIJOS NUMÉRICOS PARA FORZAR EL ORDEN DE EJECUCIÓN
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql
      - ./db/init.sql:/docker-entrypoint-initdb.d/02-init.sql
    restart: unless-stopped

volumes:
  mariadb_data:
  uploads_data:
